<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow | Volt Glow Spiral</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            /* Volt Yellow Theme */
            --accent: #F1FF5E; 
            --accent-glow: rgba(241, 255, 94, 0.6);
            --accent-faded: rgba(241, 255, 94, 0.08);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: row; 
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 800px;
            padding: 2rem;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                max-height: none;
                height: 100vh;
                padding: 1rem;
            }
            .panel { width: 100% !important; height: 50%; }
        }

        .panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 50%;
            position: relative;
        }

        .left-panel {
            border-right: 1px solid #111;
        }

        @media (max-width: 768px) { .left-panel { border-right: none; border-bottom: 1px solid #111; } }

        /* Spiral Visualizer with Heavy Glow */
        #spiral-svg {
            width: 90%;
            max-width: 420px;
            filter: drop-shadow(0 0 25px var(--accent-glow));
        }

        .spiral-path {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .spiral-ghost {
            stroke: var(--accent-faded);
        }

        .spiral-grow {
            stroke: var(--accent);
            transition: stroke-dashoffset 1s linear;
        }

        .right-panel {
            padding: 2rem;
            text-align: center;
        }

        .header-section {
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .task-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #111;
            color: var(--text-main);
            font-size: 1.5rem;
            padding: 0.5rem;
            text-align: center;
            width: 100%;
            outline: none;
            transition: var(--transition);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .task-input:focus {
            border-color: var(--accent);
            box-shadow: 0 4px 20px -5px var(--accent-glow);
        }

        .focus-label {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: -0.02em;
        }

        /* Rolling Numeric Timer - Clean Look (No Glow) */
        .timer-section {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(4rem, 10vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            overflow: hidden;
            margin: 1.5rem 0;
            background: #050505;
            border-radius: 28px;
            padding: 0 1.5rem;
            border: 1px solid #111;
            color: var(--accent);
            text-shadow: none;
        }

        .digit-box {
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 0.7em;
        }

        .digit-strip {
            transition: transform 0.45s cubic-bezier(0.45, 0, 0.55, 1);
            display: flex;
            flex-direction: column;
        }

        .digit {
            height: 140px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .separator {
            padding: 0 0.05em;
            line-height: 130px;
        }

        /* Controls */
        .controls-section {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 0.5rem;
        }

        button {
            background: #111111;
            border: 1px solid #222;
            color: var(--text-main);
            padding: 0.9rem 1.8rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            border-color: var(--accent);
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--accent-faded);
        }

        button.primary {
            background: var(--accent);
            color: #000;
            border: none;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        button.primary:hover {
            box-shadow: 0 0 40px var(--accent-glow);
            transform: scale(1.05) translateY(-2px);
        }

        /* Quick Add Buttons */
        .quick-add-section {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .btn-small {
            min-width: 70px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            border-radius: 12px;
            background: rgba(241, 255, 94, 0.05);
            border: 1px solid rgba(241, 255, 94, 0.1);
            color: var(--accent);
        }

        .btn-small:hover {
            background: var(--accent-faded);
            border-color: var(--accent);
        }

        /* Share Button Styles */
        .share-container {
            margin-top: 2rem;
        }

        #shareBtn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            font-size: 0.8rem;
            min-width: auto;
            padding: 0.5rem 1rem;
            opacity: 0.7;
            cursor: pointer;
            transition: var(--transition);
        }

        #shareBtn:hover {
            opacity: 1;
            background: var(--accent-faded);
        }

        .hidden { display: none; }

        #notification {
            position: fixed;
            top: 20px;
            background: #111;
            border: 1px solid var(--accent);
            padding: 0.75rem 1.8rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-100px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #notification.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="notification">System Live</div>

    <div class="app-container">
        <!-- LEFT PANEL: THE SPIRAL -->
        <div class="panel left-panel">
            <svg id="spiral-svg" viewBox="0 0 200 200">
                <path id="spiral-ghost" class="spiral-path spiral-ghost"></path>
                <path id="spiral-grow" class="spiral-path spiral-grow"></path>
            </svg>
        </div>

        <!-- RIGHT PANEL: TASK + TIMER + CONTROLS -->
        <div class="panel right-panel">
            <div class="header-section">
                <div id="editMode">
                    <input type="text" id="taskInput" class="task-input" placeholder="Enter focus objective..." maxlength="25">
                </div>
                <div id="focusMode" class="hidden">
                    <div class="focus-label" id="focusText">Calibrating...</div>
                </div>
            </div>

            <div class="timer-section">
                <div class="digit-box"><div class="digit-strip" id="m10"></div></div>
                <div class="digit-box"><div class="digit-strip" id="m1"></div></div>
                <span class="separator">:</span>
                <div class="digit-box"><div class="digit-strip" id="s10"></div></div>
                <div class="digit-box"><div class="digit-strip" id="s1"></div></div>
            </div>

            <div class="controls-section">
                <button id="startBtn" class="primary">Play</button>
                <button id="pauseBtn" class="hidden">Pause</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="quick-add-section">
                <button class="btn-small" onclick="addTime(5)">+5M</button>
                <button class="btn-small" onclick="addTime(10)">+10M</button>
                <button class="btn-small" onclick="addTime(15)">+15M</button>
            </div>

            <div class="share-container">
                <button id="shareBtn">Copy Live Sync Link</button>
            </div>
        </div>
    </div>

    <script>
        // Timer Constants & State
        const DEFAULT_WORK_TIME = 25 * 60;
        const DEFAULT_BREAK_TIME = 5 * 60;
        const DIGIT_HEIGHT = 140; 
        
        let timeLeft = DEFAULT_WORK_TIME;
        let timerId = null;
        let isWorkMode = true;
        let isRunning = false;
        let currentDigits = ["0", "0", "0", "0"];
        let playStartedAt = null; // To track when the timer was started for sync

        // UI Elements
        const strips = [
            document.getElementById('m10'),
            document.getElementById('m1'),
            document.getElementById('s10'),
            document.getElementById('s1')
        ];
        const spiralGrow = document.getElementById('spiral-grow');
        const spiralGhost = document.getElementById('spiral-ghost');
        const notification = document.getElementById('notification');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const shareBtn = document.getElementById('shareBtn');
        const taskInput = document.getElementById('taskInput');
        const focusText = document.getElementById('focusText');
        const editMode = document.getElementById('editMode');
        const focusMode = document.getElementById('focusMode');

        // Spiral Generation
        function generateSpiralPath() {
            const centerX = 100, centerY = 100, rotations = 6, points = 350;
            let d = `M ${centerX} ${centerY} `;
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2 * rotations;
                const radius = (i / points) * 92; 
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                d += `L ${x} ${y} `;
            }
            return d;
        }

        const pathData = generateSpiralPath();
        spiralGhost.setAttribute('d', pathData);
        spiralGrow.setAttribute('d', pathData);
        const spiralLength = spiralGrow.getTotalLength();
        spiralGrow.style.strokeDasharray = spiralLength;
        spiralGrow.style.strokeDashoffset = spiralLength;

        // Initialize Digits
        strips.forEach(strip => {
            for(let i=0; i<=9; i++) {
                const div = document.createElement('div');
                div.className = 'digit';
                div.textContent = i;
                strip.appendChild(div);
            }
        });

        // Timer Logic
        function updateTimerUI(force = false) {
            const mins = Math.max(0, Math.floor(timeLeft / 60));
            const secs = Math.max(0, timeLeft % 60);
            const digits = [
                Math.floor(mins / 10).toString(),
                (mins % 10).toString(),
                Math.floor(secs / 10).toString(),
                (secs % 10).toString()
            ];

            digits.forEach((digit, i) => {
                if (digit !== currentDigits[i] || force) {
                    strips[i].style.transform = `translateY(-${parseInt(digit) * DIGIT_HEIGHT}px)`;
                }
            });
            currentDigits = digits;

            const total = isWorkMode ? DEFAULT_WORK_TIME : DEFAULT_BREAK_TIME;
            const progress = 1 - Math.max(0, timeLeft / total);
            spiralGrow.style.strokeDashoffset = spiralLength * (1 - Math.min(1, progress));
        }

        function showNotification(msg) {
            notification.textContent = msg;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        // IMPROVED URL Sharing Logic (Calculates time offset)
        function generateShareLink() {
            const params = new URLSearchParams();
            
            // If running, we calculate the time remaining based on the global timestamp
            if (isRunning && playStartedAt) {
                params.set('st', playStartedAt); // Start timestamp
                params.set('tl', timeLeft + Math.floor((Date.now() - playStartedAt) / 1000)); // Total time at start
            } else {
                params.set('t', timeLeft); // Static time if paused
            }
            
            params.set('m', isWorkMode ? 'w' : 'b');
            params.set('r', isRunning ? '1' : '0');
            params.set('tk', taskInput.value.trim() || focusText.textContent);
            
            const shareUrl = window.location.origin + window.location.pathname + '?' + params.toString();
            
            // Copy to clipboard
            const textarea = document.createElement('textarea');
            textarea.value = shareUrl;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showNotification("Synced link copied! Open this to stay in sync.");
            } catch (err) {
                console.error("Copy failed", err);
            }
            document.body.removeChild(textarea);
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('t') || params.has('st')) {
                const isPaused = params.get('r') === '0';
                isWorkMode = params.get('m') === 'w';
                const task = params.get('tk') || "";
                taskInput.value = task;
                focusText.textContent = task || "Deep Focus";

                if (isPaused) {
                    timeLeft = parseInt(params.get('t'));
                } else {
                    // Calculating offset for live sync
                    const startTimestamp = parseInt(params.get('st'));
                    const totalAtStart = parseInt(params.get('tl'));
                    const elapsedSinceStart = Math.floor((Date.now() - startTimestamp) / 1000);
                    
                    timeLeft = totalAtStart - elapsedSinceStart;
                    
                    if (timeLeft <= 0) {
                        showNotification("Session has already ended.");
                        timeLeft = 0;
                    } else {
                        startLocalTimer(true); // resume calculated position
                    }
                }
                
                updateTimerUI(true);
                showNotification("Successfully synced with session.");
            }
        }

        // Timer Control Functions
        function startLocalTimer(isSyncLoad = false) {
            if (isRunning) return;
            isRunning = true;
            
            if (!isSyncLoad) {
                playStartedAt = Date.now();
            }

            editMode.classList.add('hidden');
            focusMode.classList.remove('hidden');
            focusText.textContent = taskInput.value.trim() || "Deep Focus";
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');

            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerUI();
                } else {
                    clearInterval(timerId);
                    isRunning = false;
                    switchMode();
                    startLocalTimer();
                }
            }, 1000);
        }

        function pauseLocalTimer() {
            clearInterval(timerId);
            isRunning = false;
            playStartedAt = null;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
        }

        function switchMode() {
            isWorkMode = !isWorkMode;
            timeLeft = isWorkMode ? DEFAULT_WORK_TIME : DEFAULT_BREAK_TIME;
            if (isRunning) playStartedAt = Date.now();
            showNotification(isWorkMode ? "Focus mode active." : "Break mode active.");
            updateTimerUI(true);
        }

        // Global Event Listeners
        window.addTime = (mins) => {
            timeLeft += mins * 60;
            updateTimerUI();
            showNotification(`+${mins} Minutes Added`);
        };

        startBtn.onclick = () => startLocalTimer();
        pauseBtn.onclick = pauseLocalTimer;
        resetBtn.onclick = () => {
            pauseLocalTimer();
            isWorkMode = true;
            timeLeft = DEFAULT_WORK_TIME;
            editMode.classList.remove('hidden');
            focusMode.classList.add('hidden');
            updateTimerUI(true);
        };

        shareBtn.onclick = generateShareLink;

        taskInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') startLocalTimer();
        });

        // Initialize display and check URL on load
        window.onload = () => {
            updateTimerUI(true);
            loadFromURL();
        };
    </script>
</body>
</html>
